<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Indian Stock Insights</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0b0f14;
    --panel: #131a22;
    --border: #23303c;
    --text: #e6edf3;
    --muted: #8b98a5;
    --accent: #3b82f6;
    --user-bubble: #1e2a38;
    --assistant-bubble: #131a22;
    --up: #22c55e;
    --down: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 1.1rem; margin: 0; }
  header p { margin: 0.2rem 0 0; color: var(--muted); font-size: 0.85rem; }

  .layout {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  /* ---- Sidebar / watchlist ---- */
  aside {
    width: 280px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 1rem;
    gap: 0.9rem;
    overflow-y: auto;
  }
  aside h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin: 0; }

  #watchlist-form { display: flex; gap: 0.4rem; }
  #watchlist-form input {
    flex: 1;
    padding: 0.5rem 0.6rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 0.85rem;
    min-width: 0;
  }
  #watchlist-form button {
    padding: 0.5rem 0.7rem;
    font-size: 0.85rem;
  }

  #watchlist-items { display: flex; flex-direction: column; gap: 0.4rem; }
  .ticker-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.4rem 0.6rem;
    font-size: 0.85rem;
  }
  .ticker-row .remove-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-weight: 400;
    padding: 0 0.2rem;
    font-size: 1rem;
    line-height: 1;
  }
  .ticker-row .remove-btn:hover { color: var(--down); }
  .watchlist-empty { color: var(--muted); font-size: 0.8rem; }

  #check-alerts-btn { width: 100%; font-size: 0.85rem; }

  #alerts-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .alert-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 0.6rem;
    font-size: 0.78rem;
    line-height: 1.4;
  }
  .alert-card .alert-symbol { font-weight: 700; }
  .alert-card.bulk_deal .alert-symbol { color: var(--accent); }
  .alert-card.shareholding_change .alert-symbol { color: #eab308; }
  .alert-card .alert-detail { color: var(--muted); }
  .alerts-empty { color: var(--muted); font-size: 0.8rem; }

  /* ---- Chat ---- */
  main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  .msg { max-width: 85%; padding: 0.7rem 1rem; border-radius: 10px; line-height: 1.45; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--user-bubble); }
  .msg.assistant { align-self: flex-start; background: var(--assistant-bubble); border: 1px solid var(--border); }
  .msg.error { align-self: flex-start; background: #3a1d1d; border: 1px solid #6b2b2b; }
  .trace { font-size: 0.75rem; color: var(--muted); margin-top: 0.4rem; }

  form.chat-form {
    display: flex;
    gap: 0.6rem;
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  form.chat-form input {
    flex: 1;
    padding: 0.7rem 0.9rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 0.95rem;
  }
  input:focus { outline: 1px solid var(--accent); }
  button {
    padding: 0.7rem 1.2rem;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: white;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }

  .examples { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0 1.5rem 1rem; max-width: 720px; margin: 0 auto; width: 100%; }
  .examples button {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    font-weight: 400;
    font-size: 0.8rem;
    padding: 0.4rem 0.7rem;
  }
</style>
</head>
<body>
  <header>
    <h1>Indian Stock Insights</h1>
    <p>Ask about NSE prices, filings, shareholding patterns, and bulk deals.</p>
  </header>

  <div class="layout">
    <aside>
      <h2>Watchlist</h2>
      <form id="watchlist-form">
        <input id="watchlist-input" type="text" placeholder="e.g. TCS" autocomplete="off" />
        <button type="submit">Add</button>
      </form>
      <div id="watchlist-items"></div>

      <button type="button" id="check-alerts-btn">Check alerts</button>

      <h2>Alerts</h2>
      <div id="alerts-list"><div class="alerts-empty">No alerts checked yet.</div></div>
    </aside>

    <main>
      <div id="chat"></div>

      <div class="examples" id="examples">
        <button type="button">What's the current price of TCS?</button>
        <button type="button">What does Reliance's shareholding pattern look like?</button>
        <button type="button">Any notable bulk deals this week?</button>
        <button type="button">Any recent announcements from Infosys?</button>
      </div>

      <form id="form" class="chat-form">
        <input id="input" type="text" placeholder="Ask a question about an NSE stock..." autocomplete="off" />
        <button type="submit" id="send">Send</button>
      </form>
    </main>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const examples = document.getElementById("examples");

    const watchlistForm = document.getElementById("watchlist-form");
    const watchlistInput = document.getElementById("watchlist-input");
    const watchlistItems = document.getElementById("watchlist-items");
    const checkAlertsBtn = document.getElementById("check-alerts-btn");
    const alertsList = document.getElementById("alerts-list");

    let conversationHistory = [];

    function addMessage(role, text, traceNames) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.textContent = text;
      if (traceNames && traceNames.length) {
        const t = document.createElement("div");
        t.className = "trace";
        t.textContent = "tools used: " + traceNames.join(", ");
        div.appendChild(t);
      }
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function ask(question) {
      addMessage("user", question);
      input.value = "";
      send.disabled = true;
      const pending = addMessage("assistant", "Thinking...");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, history: conversationHistory }),
        });
        const data = await res.json();
        if (!res.ok) {
          pending.className = "msg error";
          pending.textContent = data.detail || "Something went wrong.";
        } else {
          pending.textContent = data.answer;
          const traceNames = (data.trace || []).map((t) => t.tool);
          if (traceNames.length) {
            const t = document.createElement("div");
            t.className = "trace";
            t.textContent = "tools used: " + traceNames.join(", ");
            pending.appendChild(t);
          }
          conversationHistory.push({ role: "user", content: question });
          conversationHistory.push({ role: "assistant", content: data.answer });
        }
      } catch (err) {
        pending.className = "msg error";
        pending.textContent = "Network error: " + err.message;
      } finally {
        send.disabled = false;
        input.focus();
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const q = input.value.trim();
      if (q) ask(q);
    });

    examples.addEventListener("click", (e) => {
      if (e.target.tagName === "BUTTON") ask(e.target.textContent);
    });

    // ---- Watchlist ----

    function renderWatchlist(tickers) {
      watchlistItems.innerHTML = "";
      if (!tickers.length) {
        watchlistItems.innerHTML = '<div class="watchlist-empty">No tickers yet.</div>';
        return;
      }
      for (const ticker of tickers) {
        const row = document.createElement("div");
        row.className = "ticker-row";
        const label = document.createElement("span");
        label.textContent = ticker;
        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.className = "remove-btn";
        removeBtn.textContent = "✕";
        removeBtn.addEventListener("click", () => removeTicker(ticker));
        row.appendChild(label);
        row.appendChild(removeBtn);
        watchlistItems.appendChild(row);
      }
    }

    async function loadWatchlist() {
      try {
        const res = await fetch("/watchlist");
        const data = await res.json();
        renderWatchlist(data.tickers || []);
      } catch (err) {
        watchlistItems.innerHTML = '<div class="watchlist-empty">Failed to load watchlist.</div>';
      }
    }

    async function addTicker(ticker) {
      const res = await fetch("/watchlist", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ticker }),
      });
      const data = await res.json();
      if (res.ok) renderWatchlist(data.tickers || []);
    }

    async function removeTicker(ticker) {
      const res = await fetch("/watchlist/" + encodeURIComponent(ticker), { method: "DELETE" });
      const data = await res.json();
      if (res.ok) renderWatchlist(data.tickers || []);
    }

    watchlistForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const ticker = watchlistInput.value.trim();
      if (ticker) {
        addTicker(ticker);
        watchlistInput.value = "";
      }
    });

    // ---- Alerts ----

    function renderAlerts(alerts) {
      alertsList.innerHTML = "";
      if (!alerts.length) {
        alertsList.innerHTML = '<div class="alerts-empty">No new alerts.</div>';
        return;
      }
      for (const alert of alerts) {
        const card = document.createElement("div");
        card.className = "alert-card " + alert.type;

        if (alert.type === "bulk_deal") {
          const clientText = alert.clients.join(", ") + (alert.more_clients > 0 ? " +" + alert.more_clients + " more" : "");
          card.innerHTML =
            '<span class="alert-symbol">' + alert.symbol + '</span> — bulk deal (' + alert.num_trades + ' trade' + (alert.num_trades === 1 ? "" : "s") + ')<br>' +
            '<span class="alert-detail">Buy ' + Number(alert.buy_qty).toLocaleString("en-IN") +
            ' / Sell ' + Number(alert.sell_qty).toLocaleString("en-IN") +
            ' · ₹' + Number(alert.total_value).toLocaleString("en-IN") + ' total (' + alert.date + ')<br>' +
            clientText + '</span>';
        } else if (alert.type === "shareholding_change") {
          const sign = alert.change_pct > 0 ? "+" : "";
          card.innerHTML =
            '<span class="alert-symbol">' + alert.symbol + '</span> — promoter holding change<br>' +
            '<span class="alert-detail">' + alert.previous_promoter_pct + '% → ' + alert.current_promoter_pct +
            '% (' + sign + alert.change_pct + 'pp)</span>';
        } else {
          card.textContent = JSON.stringify(alert);
        }
        alertsList.appendChild(card);
      }
    }

    // Alerts also run automatically in the background (server-side scheduler),
    // so this just loads whatever has been logged so far.
    async function loadRecentAlerts() {
      try {
        const res = await fetch("/alerts/recent");
        const data = await res.json();
        if (res.ok) renderAlerts(data.alerts || []);
      } catch (err) {
        // silent - background poll, don't disrupt the UI on a transient failure
      }
    }

    // Forces an immediate check (rather than waiting for the next background
    // tick) and then reloads the full recent-alerts log.
    async function checkAlertsNow() {
      checkAlertsBtn.disabled = true;
      checkAlertsBtn.textContent = "Checking...";
      try {
        const res = await fetch("/alerts/check");
        const data = await res.json();
        if (!res.ok) {
          alertsList.innerHTML = '<div class="alerts-empty">' + (data.detail || "Failed to check alerts.") + '</div>';
          return;
        }
        await loadRecentAlerts();
      } catch (err) {
        alertsList.innerHTML = '<div class="alerts-empty">Network error checking alerts.</div>';
      } finally {
        checkAlertsBtn.disabled = false;
        checkAlertsBtn.textContent = "Check alerts";
      }
    }

    checkAlertsBtn.addEventListener("click", checkAlertsNow);

    loadRecentAlerts();
    setInterval(loadRecentAlerts, 60000);

    loadWatchlist();
  </script>
</body>
</html>
