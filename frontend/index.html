<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Indian Stock Insights</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0b0f14;
    --panel: #131a22;
    --border: #23303c;
    --text: #e6edf3;
    --muted: #8b98a5;
    --accent: #3b82f6;
    --user-bubble: #1e2a38;
    --assistant-bubble: #131a22;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 1.1rem; margin: 0; }
  header p { margin: 0.2rem 0 0; color: var(--muted); font-size: 0.85rem; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  .msg { max-width: 85%; padding: 0.7rem 1rem; border-radius: 10px; line-height: 1.45; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--user-bubble); }
  .msg.assistant { align-self: flex-start; background: var(--assistant-bubble); border: 1px solid var(--border); }
  .msg.error { align-self: flex-start; background: #3a1d1d; border: 1px solid #6b2b2b; }
  .trace { font-size: 0.75rem; color: var(--muted); margin-top: 0.4rem; }

  form {
    display: flex;
    gap: 0.6rem;
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  input {
    flex: 1;
    padding: 0.7rem 0.9rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 0.95rem;
  }
  input:focus { outline: 1px solid var(--accent); }
  button {
    padding: 0.7rem 1.2rem;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: white;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }

  .examples { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0 1.5rem 1rem; max-width: 720px; margin: 0 auto; width: 100%; }
  .examples button {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    font-weight: 400;
    font-size: 0.8rem;
    padding: 0.4rem 0.7rem;
  }
</style>
</head>
<body>
  <header>
    <h1>Indian Stock Insights</h1>
    <p>Ask about NSE prices, filings, shareholding patterns, and bulk deals.</p>
  </header>

  <div id="chat"></div>

  <div class="examples" id="examples">
    <button type="button">What's the current price of TCS?</button>
    <button type="button">What does Reliance's shareholding pattern look like?</button>
    <button type="button">Any notable bulk deals this week?</button>
    <button type="button">Any recent announcements from Infosys?</button>
  </div>

  <form id="form">
    <input id="input" type="text" placeholder="Ask a question about an NSE stock..." autocomplete="off" />
    <button type="submit" id="send">Send</button>
  </form>

  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const examples = document.getElementById("examples");

    function addMessage(role, text, traceNames) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.textContent = text;
      if (traceNames && traceNames.length) {
        const t = document.createElement("div");
        t.className = "trace";
        t.textContent = "tools used: " + traceNames.join(", ");
        div.appendChild(t);
      }
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function ask(question) {
      addMessage("user", question);
      input.value = "";
      send.disabled = true;
      const pending = addMessage("assistant", "Thinking...");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        const data = await res.json();
        if (!res.ok) {
          pending.className = "msg error";
          pending.textContent = data.detail || "Something went wrong.";
        } else {
          pending.textContent = data.answer;
          const traceNames = (data.trace || []).map((t) => t.tool);
          if (traceNames.length) {
            const t = document.createElement("div");
            t.className = "trace";
            t.textContent = "tools used: " + traceNames.join(", ");
            pending.appendChild(t);
          }
        }
      } catch (err) {
        pending.className = "msg error";
        pending.textContent = "Network error: " + err.message;
      } finally {
        send.disabled = false;
        input.focus();
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const q = input.value.trim();
      if (q) ask(q);
    });

    examples.addEventListener("click", (e) => {
      if (e.target.tagName === "BUTTON") ask(e.target.textContent);
    });
  </script>
</body>
</html>
